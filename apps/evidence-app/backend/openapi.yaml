      x-auth-type: None
      responses: {"200": {description: OK}}
  "/{a}/{b}/{c}/{d}":
    parameters:
      - {name: a, in: path, required: true, schema: {type: string}}
      - {name: b, in: path, required: true, schema: {type: string}}
      - {name: c, in: path, required: true, schema: {type: string}}
      - {name: d, in: path, required: true, schema: {type: string}}
    get:
      operationId: w4g
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    post:
      operationId: w4p
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    put:
      operationId: w4pu
      security: []

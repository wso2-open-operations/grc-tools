openapi: "3.0.0"
info:
  title: Compliance Backend
  version: "1.0.0"
security: []
paths:
  # Wildcard patterns for all path depths — covers every FastAPI route
  # without maintaining a list. Choreo/WSO2 APIM uses x-auth-type: None
  # to disable gateway-level auth on these resources.
  "/{a}":
    parameters:
      - {name: a, in: path, required: true, schema: {type: string}}
    get:
      operationId: w1g
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    post:
      operationId: w1p
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    put:
      operationId: w1pu
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    patch:
      operationId: w1pa
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    delete:
      operationId: w1d
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
  "/{a}/{b}":
    parameters:
      - {name: a, in: path, required: true, schema: {type: string}}
      - {name: b, in: path, required: true, schema: {type: string}}
    get:
      operationId: w2g
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    post:
      operationId: w2p
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    put:
      operationId: w2pu
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    patch:
      operationId: w2pa
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    delete:
      operationId: w2d
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
  "/{a}/{b}/{c}":
    parameters:
      - {name: a, in: path, required: true, schema: {type: string}}
      - {name: b, in: path, required: true, schema: {type: string}}
      - {name: c, in: path, required: true, schema: {type: string}}
    get:
      operationId: w3g
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    post:
      operationId: w3p
      security: []
      x-auth-type: None
      responses: {"200": {description: OK}}
    put:
      operationId: w3pu
      security: []

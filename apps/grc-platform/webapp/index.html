<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Fallback CSP for any serving path that bypasses nginx.conf's
      Content-Security-Policy header (e.g. `vite preview`, an alternate
      static host). Mirrors that header's directives — see it for the
      per-directive rationale — minus frame-ancestors/report-uri/sandbox,
      which browsers ignore when delivered via <meta> rather than a header.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: http://localhost:*; frame-src 'self' https://*.asgardeo.io; child-src 'self' https://*.asgardeo.io; form-action 'self' https://*.asgardeo.io; object-src 'none'; base-uri 'self'; upgrade-insecure-requests"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/logo-dark.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/logo-white.svg"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRC Platform</title>
    <script
      src="/config.js"
      onerror="console.error('[GRC Platform] Missing /config.js — create webapp/public/config.js (see README).')"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

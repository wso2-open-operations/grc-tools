# GRC Platform — SPA serving config with security response headers.
# Serves the Vite production build and delivers the HTTP security headers
# required by the Application Deployment Security Checklist.

server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Security headers (applied to every response via "always") ──
    # Clickjacking: refuse to be framed.
    add_header X-Frame-Options                   "DENY"                                              always;
    # Stop MIME-sniffing (matters for served/downloaded evidence content).
    add_header X-Content-Type-Options            "nosniff"                                           always;
    # Don't leak URLs to other origins.
    add_header Referrer-Policy                   "no-referrer"                                        always;
    # Block legacy Flash/PDF cross-domain policies.
    add_header X-Permitted-Cross-Domain-Policies "none"                                              always;
    # Force HTTPS for one year, incl. subdomains, and allow preload.
    add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains; preload"      always;
    # Disable browser features the app does not use.
    add_header Permissions-Policy                "accelerometer=(),autoplay=(),camera=(),display-capture=(),document-domain=(),encrypted-media=(),fullscreen=(),geolocation=(),gyroscope=(),magnetometer=(),microphone=(),midi=(),payment=(),picture-in-picture=(),publickey-credentials-get=(),screen-wake-lock=(),sync-xhr=(self),usb=(),web-share=(),xr-spatial-tracking=()" always;
    # Content Security Policy — the main XSS mitigation.
    #   script-src 'self'          : only same-origin bundles run (blocks injected scripts).
    #   style-src  'unsafe-inline' : required by MUI/emotion runtime styles.
    #   connect-src 'self' https:  : allow XHR/fetch to the backend API + Asgardeo over HTTPS
    #                                (kept broad so it works across environments; tighten to
    #                                 explicit origins later for stronger exfil protection).
    #   frame-src / form-action    : allow the Asgardeo OIDC redirect/iframe.
    #   frame-ancestors 'none'     : clickjacking (HTTP-header equivalent of X-Frame-Options).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-src 'self' https://*.asgardeo.io; child-src 'self' https://*.asgardeo.io; form-action 'self' https://*.asgardeo.io; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; block-all-mixed-content; upgrade-insecure-requests" always;

    # SPA client-side routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

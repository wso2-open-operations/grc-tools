components:
  parameters:
    IntId:
      name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        code: &id004
          type: integer
        message: &id005
          type: string
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
    Pagination:
      type: object
      properties:
        limit:
          type: integer
          default: 20
          maximum: 100
        offset:
          type: integer
          default: 0
    User:
      type: object
      properties:
        id: *id004
        email: *id005
        displayName: *id005
        auditTeamId: &id006
          type: integer
          nullable: true
        riskTeamId: *id006
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - REMOVED
        createdOn: &id007
          type: string
          format: date-time
        updatedOn: *id007
    SearchUsersRequest:
      type: object
      properties:
        searchQuery: *id005
        statusKey:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
          - REMOVED
        pagination:
          $ref: '#/components/schemas/Pagination'
    SearchUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total: *id004
        limit: *id004
        offset: *id004
    CreateUserRequest:
      type: object
      properties:

openapi: 3.0.3
info:
  title: "GRC Platform \u2013 Compliance Entity Service"
  description: Internal entity service exposing all audit and risk data from the GRC Platform MySQL database. Authentication
    is handled by the Choreo API Gateway; this service is only reachable by other Choreo components within the same organisation.
  version: 1.1.0
servers:
- url: http://localhost:8080
  description: Local development
tags:
- name: Health
- name: Users
- name: Audit Teams
- name: Audit Frameworks
- name: Audit Products
- name: Audits
- name: Audit Trail
- name: Controls
- name: Evidence
- name: Comments
- name: AI Validations
- name: Populations
- name: Risk Teams
- name: Risk Scores
- name: Risk Compliance References
- name: Risks
- name: Risk Action Plans
- name: Risk Action Steps
- name: Risk Escalations
- name: Risk Change Log
- name: Risk Evidence
- name: Risk Assessments
